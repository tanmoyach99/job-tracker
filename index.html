<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Job tracker</title>
  </head>
  <body>
    <header class="w-11/12 mx-auto bg-base-200 p-4 rounded-xl mt-4">
      <h1
        class="font-extrabold text-2xl md:text-4xl py-4 text-center lg:text-left"
      >
        Job Application tracker
      </h1>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 lg:gap-5">
        <div class="card w-full bg-base-100 shadow-sm">
          <div class="card-body p-4 md:p-8">
            <h2 class="card-title text-sm md:text-base">Total</h2>
            <h4 id="total-no" class="font-extrabold text-xl md:text-2xl">8</h4>
          </div>
        </div>

        <div class="card w-full bg-base-100 shadow-sm">
          <div class="card-body p-4 md:p-8">
            <h2 class="card-title text-sm md:text-base">Interview</h2>
            <h4
              id="interview-no"
              class="text-green-400 font-extrabold text-xl md:text-2xl"
            >
              0
            </h4>
          </div>
        </div>

        <div class="card w-full bg-base-100 shadow-sm">
          <div class="card-body p-4 md:p-8">
            <h2 class="card-title text-sm md:text-base">Rejected</h2>
            <h4
              id="rejected-no"
              class="text-red-400 font-extrabold text-xl md:text-2xl"
            >
              0
            </h4>
          </div>
        </div>
      </div>
    </header>
    <main>
      <section
        class="count w-11/12 mx-auto bg-base-200 p-4 sticky z-10 top-0 border-b border-base-300"
      >
        <h1 class="text-bold text-xl md:text-3xl mb-2">Available Jobs</h1>

        <div
          class="flex flex-col md:flex-row md:justify-between md:items-center gap-4"
        >
          <div class="flex flex-wrap gap-2 md:gap-3">
            <button id="all-btn" class="btn btn-sm md:btn-md btn-primary">
              all
            </button>
            <button
              id="interview-btn"
              class="btn btn-sm md:btn-md btn-outline btn-success"
            >
              interview
            </button>
            <button
              id="rejected-btn"
              class="btn btn-sm md:btn-md btn-outline btn-error"
            >
              rejected
            </button>
          </div>

          <p
            id="total-count"
            class="text-gray-800 font-bold text-sm md:text-base md:px-10"
          >
            total 8 jobs
          </p>
        </div>
      </section>
      <section
        class="job-container w-11/12 mx-auto bg-base-200 p-4"
        id="all-jobs"
      ></section>

      <section
        class="job-container w-11/12 mx-auto bg-base-200 p-4 hidden"
        id="interview-jobs"
      ></section>

      <section
        class="job-container w-11/12 mx-auto bg-base-200 p-4 hidden"
        id="rejected-jobs"
      ></section>
    </main>
    <script src="./data.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
